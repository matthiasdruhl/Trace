name: deployed proof replay CI

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'fixtures/deployed/**'
      - '.github/workflows/deployed-proof-replay.yml'
      - '.github/workflows/deployed-proof-live.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'fixtures/deployed/**'
      - '.github/workflows/deployed-proof-replay.yml'
      - '.github/workflows/deployed-proof-live.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  replay-proof:
    name: Replay deployed proof fixtures
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/constraints.txt

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt -c scripts/constraints.txt

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Replay committed proof fixtures
        run: |
          python scripts/prove_deployed_path.py \
            --replay-fixtures-dir fixtures/deployed/examples

      - name: Summarize replay validation
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          latest_run="$(ls -td artifacts/validation-runs/* 2>/dev/null | head -n 1 || true)"
          if [[ -z "${latest_run}" ]]; then
            {
              echo "## Proof Replay"
              echo
              echo "- Status: `no-artifacts`"
              echo "- Job status: `${{ job.status }}`"
              echo "- Details: no validation run directory was created."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          manifest_path="${latest_run}/manifest.json"
          if [[ ! -f "${manifest_path}" ]]; then
            {
              echo "## Proof Replay"
              echo
              echo "- Status: `manifest-missing`"
              echo "- Job status: `${{ job.status }}`"
              echo "- Run directory: \`${latest_run}\`"
              echo "- Details: proof exited before writing manifest.json; inspect uploaded logs/artifacts from this run directory for the root failure."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          python - "${manifest_path}" "${{ job.status }}" >> "${GITHUB_STEP_SUMMARY}" <<'PY'
import json
import sys
from pathlib import Path

manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
job_status = sys.argv[2]
completeness = manifest.get("completeness") or {}

print("## Proof Replay")
print()
print(f"- Status: `{ 'passed' if completeness.get('complete') else 'failed' }`")
print(f"- Job status: `{job_status}`")
print(f"- Run mode: `{manifest.get('run_mode')}`")
print(f"- Fixture source: `{manifest.get('fixture_source_dir')}`")
print(
    "- Selected cases: "
    + ", ".join(f"`{case_id}`" for case_id in manifest.get("selected_case_ids") or [])
)
incomplete = completeness.get("incomplete_case_ids") or []
print(
    "- Incomplete cases: "
    + (", ".join(f"`{case_id}`" for case_id in incomplete) if incomplete else "none")
)
PY

      - name: Upload replay artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deployed-proof-replay-artifacts
          path: artifacts/validation-runs
          if-no-files-found: warn
