name: python CI

on:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/python-ci.yml'
  workflow_dispatch:

jobs:
  python-tests:
    name: Scripts and tests (Python)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/constraints.txt

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt -c scripts/constraints.txt

      - name: Run Python unit tests
        run: python -m unittest tests.test_seed tests.test_prove_deployed_path tests.test_proof_mcp_stdio
