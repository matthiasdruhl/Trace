name: targeted python CI

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'fixtures/eval/**'
      - 'fixtures/deployed/**'
      - '.github/workflows/full-ci.yml'
      - '.github/workflows/python-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'fixtures/eval/**'
      - 'fixtures/deployed/**'
      - '.github/workflows/full-ci.yml'
      - '.github/workflows/python-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  targeted-python-ci:
    name: Reuse full CI for Python changes
    uses: ./.github/workflows/full-ci.yml
    with:
      run_mcp_bridge: false
      run_frontend: false
      run_rust: false
      run_package: false
      run_python: true
