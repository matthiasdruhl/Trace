name: full CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mcp-bridge:
    name: MCP bridge (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: mcp-bridge/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck & build
        run: npm run build
      - name: Run MCP bridge test suite
        run: npm test

  frontend:
    name: Frontend app
    if: ${{ hashFiles('demo-ui/package.json') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: demo-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests if present
        run: npm run --if-present test
      - name: Run frontend typecheck if present
        run: npm run --if-present typecheck
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda-engine
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust cache (lambda-engine)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lambda-engine
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test

  package:
    name: SAM package
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            mcp-bridge/package-lock.json
            demo-ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Rust cache (lambda-engine)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lambda-engine

      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Cache cargo-lambda binary
        id: cache-cargo-lambda
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-lambda
          key: cargo-lambda-bin-${{ runner.os }}-x86_64-v1

      - name: Install cargo-lambda
        if: steps.cache-cargo-lambda.outputs.cache-hit != 'true'
        run: curl -fsSL https://cargo-lambda.info/install.sh | sh

      - name: Install aarch64 GNU linker (cross)
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install frontend dependencies
        working-directory: demo-ui
        run: npm ci

      - name: Install esbuild for SAM NodejsNpmEsbuildBuilder
        run: npm install --global esbuild

      - name: Build frontend publish artifact
        working-directory: demo-ui
        env:
          VITE_TRACE_API_BASE_URL: https://trace.example.invalid
        run: npm run build

      - name: Validate frontend publish artifact
        run: |
          test -f demo-ui/dist/index.html
          test -d demo-ui/dist/assets

      - name: Upload frontend publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: trace-app-frontend-dist
          path: demo-ui/dist
          if-no-files-found: error

      - name: SAM validate (--lint)
        run: sam validate --lint

      - name: Remove stale local build outputs
        run: rm -rf .aws-sam mcp-bridge/dist

      - name: SAM build (ARM64 / provided.al2023 via cargo-lambda)
        env:
          SAM_CLI_BETA_RUST_CARGO_LAMBDA: "1"
        run: sam build --beta-features --no-cached

      - name: Validate packaged app API artifact
        run: test -f .aws-sam/build/TraceAppApiFunction/app-api.mjs

  python-tests:
    name: Scripts and tests (Python)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/constraints.txt

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt -c scripts/constraints.txt

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
