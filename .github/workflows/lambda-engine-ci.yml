name: targeted app/backend CI

on:
  pull_request:
    paths:
      - 'demo-ui/**'
      - 'lambda-engine/**'
      - 'mcp-bridge/**'
      - 'template.yaml'
      - '.github/workflows/deploy-production.yml'
      - '.github/workflows/full-ci.yml'
      - '.github/workflows/lambda-engine-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'demo-ui/**'
      - 'lambda-engine/**'
      - 'mcp-bridge/**'
      - 'template.yaml'
      - '.github/workflows/deploy-production.yml'
      - '.github/workflows/full-ci.yml'
      - '.github/workflows/lambda-engine-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  targeted-app-backend-ci:
    name: Reuse full CI for app/backend changes
    uses: ./.github/workflows/full-ci.yml
    with:
      run_mcp_bridge: true
      run_frontend: true
      run_rust: true
      run_package: true
      run_python: false
